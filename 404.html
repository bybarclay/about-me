<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada</title>
    <!-- Google Font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  
    
    
    
    <!-- Favicon -->
<link rel="icon" href="https://bucket.mlcdn.com/a/3336/3336910/images/cb4b37522607da45b7f91a8253f835eaf09b1f9e.png">


    
    
    
    <style>
        /* ===== YOUR ORANGE COLOR PALETTE ===== */
        :root {
            --skin-color: #ff5011;
            --mirage-color: hsl(210, 10%, 23%);
            --title-color: hsl(210, 8%, 95%);
            --text-color: hsl(210, 8%, 85%);
            --body-color: hsl(210, 19%, 5%);
            --box-color: hsl(210, 14%, 10%);
            --scroll-box-color: hsl(210, 12%, 38%);
            --scroll-thumb-color: #ff5011;
            --hue-color: 210; /* for hsl fallbacks */
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== MATRIX CANVAS ===== */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            pointer-events: none;
        }

        /* ===== CENTERED CARD ===== */
        .card {
            position: relative;
            z-index: 1;
            background: var(--box-color);
            background: rgba(10, 14, 19, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--scroll-box-color);
            border-radius: 1rem;
            padding: 3rem 4rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            
            /* ===== UPDATED TRANSITION (includes border & shadow) ===== */
            transition: transform 0.3s ease, box-shadow 0.4s ease, border-color 0.3s ease;
        }

        /* ===== NEW: CARD HOVER EFFECT ===== */
        .card:hover {
            transform: scale(1.04);
            box-shadow: 0 0 30px rgba(255, 80, 17, 0.25),
                        0 25px 50px -8px rgba(0, 0, 0, 0.9);
            border-color: var(--skin-color);
        }

        /* ===== TITLE WITH ANIMATED GLOW ===== */
        .card h1 {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: var(--skin-color);
            margin-bottom: 0.25rem;
            letter-spacing: -4px;

            /* ===== NEW: GLOW ANIMATION (replaces static shadow) ===== */
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        /* ===== NEW: KEYFRAMES FOR THE BREATHING GLOW ===== */
        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px rgba(255, 80, 17, 0.4),
                             0 0 40px rgba(255, 80, 17, 0.15);
            }
            50% {
                text-shadow: 0 0 40px rgba(255, 80, 17, 0.8),
                             0 0 80px rgba(255, 80, 17, 0.4),
                             0 0 120px rgba(255, 80, 17, 0.15);
            }
            100% {
                text-shadow: 0 0 20px rgba(255, 80, 17, 0.4),
                             0 0 40px rgba(255, 80, 17, 0.15);
            }
        }

        .card .subtitle {
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--title-color);
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .card .subtitle span {
            color: var(--text-color);
            opacity: 0.7;
        }


        
   
         .btn {
            display: inline-flex;
            align-items: center;
            column-gap: .5rem;
            background-color: var(--skin-color);
            color: var(--title-color);
            padding: 0.75rem 2rem;
            border-radius: .5rem;
            font-weight: var(--font-medium);
            position: relative;
            z-index: 1;
            transition: .4s;
            text-decoration: none; /* ← Add this line to remove underline */
        }

        

         .btn::after {
            position: absolute;
            content: '';
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--mirage-color);
            z-index: -1;
            transform-origin: center;
            transform: scale(0);
            border-radius: .25rem;
            transition: .3s;
        }


        
        .btn:hover::after {
            transform: scale(1);
        }



        

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .card {
                padding: 2rem 1.5rem;
            }
            .card h1 {
                font-size: 5.5rem;
            }
            .card .subtitle {
                font-size: 1.1rem;
            }
            .btn {
                font-size: 1rem;
                padding: 0.8rem 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Matrix Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Centered Card -->
    <div class="card">
        <h1>404</h1>
        <p class="subtitle">The page you are looking for <span>does not exist.</span> Check back later.</p>
        <a href="/" class="btn">Back to Homepage</a>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Orange color (same as --skin-color)
            const ORANGE = '#ff5011';

            let width, height;
            let columns = [];
            let fontSize = 20; // will adapt to screen size

            // Resize function
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;

                // Adapt font size based on width
                fontSize = Math.max(16, Math.min(24, width / 40));
                // Number of columns
                const colCount = Math.floor(width / fontSize);
                columns = [];
                for (let i = 0; i < colCount; i++) {
                    // Each column: { x, y, speed, chars }
                    const col = {
                        x: i * fontSize + (fontSize / 2),
                        y: Math.random() * height * -1, // start above screen
                        speed: 2 + Math.random() * 6,
                        chars: [] // we'll fill this each frame
                    };
                    columns.push(col);
                }
            }

            // Generate a random digit (0-9) or occasionally '4','0','4' to emphasize 404
            function getDigit() {
                // 30% chance to output '4', '0', or '4' to make 404 more visible
                const r = Math.random();
                if (r < 0.15) return '4';
                if (r < 0.30) return '0';
                if (r < 0.45) return '4';
                return Math.floor(Math.random() * 10).toString();
            }

            // Animation loop
            function draw() {
                // Semi-transparent black to create trail effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
                ctx.fillRect(0, 0, width, height);

                // Set text style
                ctx.font = fontSize + 'px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                // Loop over each column
                for (let col of columns) {
                    // Move down
                    col.y += col.speed;

                    // If off screen bottom, reset to top with random speed and position
                    if (col.y > height) {
                        col.y = -fontSize * 2;
                        col.speed = 2 + Math.random() * 6;
                        col.x = Math.floor(Math.random() * (width / fontSize)) * fontSize + (fontSize / 2);
                    }

                    // Determine number of characters to draw in this column (density)
                    const numChars = 10 + Math.floor(Math.random() * 15);
                    for (let i = 0; i < numChars; i++) {
                        const yPos = col.y - i * fontSize;
                        // Only draw if visible
                        if (yPos < -fontSize || yPos > height + fontSize) continue;

                        // Random opacity: brighter at the top (newest) fading out
                        const opacity = 1 - (i / numChars) * 0.9;
                        // Slight variation
                        ctx.globalAlpha = opacity * (0.7 + 0.3 * Math.random());

                        // Color: orange with slight brightness variation
                        ctx.fillStyle = ORANGE;
                        // Alternative: use hsl with same hue but varying lightness
                        // but we'll stick to solid orange for clarity

                        const char = getDigit();
                        ctx.fillText(char, col.x, yPos);
                    }
                }

                // Reset global alpha
                ctx.globalAlpha = 1;

                requestAnimationFrame(draw);
            }

            // Initial setup and event listeners
            window.addEventListener('resize', resize);
            resize();
            draw();

            // Optional: add a little glow effect by drawing a subtle overlay
            // but not needed

        })();
    </script>
</body>
</html>
